name: Build and Push aws-s3-mcp-server to ECR
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS Region"
        type: string
        required: true
        default: "us-east-1"
      ecr_repository:
        description: "ECR repository"
        type: string
        required: true
        default: "jarvis/aws-s3-mcp-server"
      dockerfile:
        description: "Dockerfile path"
        type: string
        required: true
        default: "src/aws-s3-mcp-server/Dockerfile"

permissions:
  id-token: write
  contents: read

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SAAS_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-ecr
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ inputs.ecr_repository }}" \
            --region "${{ inputs.aws_region }}" \
          || aws ecr create-repository \
            --repository-name "${{ inputs.ecr_repository }}" \
            --region "${{ inputs.aws_region }}" \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: src/aws-s3-mcp-server
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}:latest
          provenance: false
